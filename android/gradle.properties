org.gradle.jvmargs=-Xmx6144m --enable-native-access=ALL-UNNAMED
android.useAndroidX=true
android.enableJetifier=true
android.enableR8=true
kotlin.jvm.target.validation.mode = IGNORE
# Deshabilita compilación incremental de Kotlin para evitar bug cross-drive en Windows
# (pub cache en C: vs proyecto en E: rompe RelocatableFileToPathConverter)
kotlin.incremental=false
